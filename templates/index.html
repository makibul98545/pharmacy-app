<!DOCTYPE html>
<html>
<head>
    <title>MM LifeCare Medical Ledger</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="app">

    <!-- Sidebar -->
    <div class="sidebar">
        <h2>MM LifeCare Medical Ledger</h2>

        <button onclick="navigateTo('topSection')">🏠 Dashboard</button>
        <button onclick="navigateTo('formSection')">➕ Add Entry</button>
        <button onclick="navigateTo('tableSection')">📋 Ledger</button>
        <button onclick="navigateTo('summarySection')">📊 Summary</button>
        <button onclick="navigateTo('expenseSection')">💸 Expense</button>
        <button onclick="navigateTo('reminderSection')">📩 Reminders</button>
        <button id="themeBtn">🌙 Dark Mode</button>
    </div>

    <!-- Main -->
    <div class="main">

        <!-- DASHBOARD -->
        <div id="topSection" class="screen active">
            <h2>Dashboard</h2>
            <div class="cards">
                <div class="card blue">
                    <h4>Total Purchase</h4>
                    <p id="cardPurchase">0</p>
                </div>
                <div class="card green">
                    <h4>Total Payment</h4>
                    <p id="cardPayment">0</p>
                </div>
                <div class="card yellow">
                    <h4>Net Balance</h4>
                    <p id="cardNet">0</p>
                </div>
            </div>
        </div>

        <!-- FORM -->
        <div id="formSection" class="screen">
            <h2>Add Entry</h2>
            <select id="entryType">
                <option value="customer">Customer (Sale)</option>
                <option value="distributor">Distributor (Purchase)</option>
            </select>
            <div class="form-grid">
                <input type="datetime-local" id="date">
                <input id="name" placeholder="Customer Name">
                <input id="phone" placeholder="Phone Number">
                <input id="purchase" placeholder="Purchase">
                <input id="payment" placeholder="Payment">
            </div>
            <button class="primary" onclick="addEntry()">Add Entry</button>
        </div>

        <!-- LEDGER -->
        <div id="tableSection" class="screen">
            <h2>Ledger</h2>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Name</th>                                                        
                            <th>Previous</th>
                            <th>Sale</th>
                            <th>Payment</th>
                            <th>Balance</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="ledgerTableBody"></tbody>
                </table>
            </div>
        </div>

        <!-- SUMMARY -->
        <div id="summarySection" class="screen">
            <h2>Summary</h2>
            <div id="summaryBox" class="summary-box"></div>
        </div>

        <!-- EXPENSE -->
        <div id="expenseSection" class="screen">

            <div style="margin:10px 0;">
                <b>Custom Range:</b><br>
                <input type="date" id="rangeStart">
                <input type="date" id="rangeEnd">
                <button onclick="loadExpenseRange()">Filter</button>
            </div>

            <div id="rangeResult" style="margin-top:10px;"></div>

            <div style="margin-bottom:10px;">
                <select id="expenseFilter" onchange="loadExpenseSummary()">
                    <option value="week">This Week</option>
                    <option value="month" selected>This Month</option>
                    <option value="year">This Year</option>
                </select>
            </div>    

            <div id="expenseSummary" style="margin-top:10px;font-weight:bold;"></div>

            <h2>Expense</h2>
            <div class="form-grid">
                <input id="expTitle" placeholder="Expense Title">

                <select id="expensePeriod" onchange="loadExpenseBreakdown()">
                    <option value="last_week">Last Week</option>
                    <option value="last_month" selected>Last Month</option>
                    <option value="last_year">Last Year</option>
                </select>

                <select id="expCategory">
                    <option value="fuel">Fuel</option>
                    <option value="rent">Rent</option>
                    <option value="salary">Salary</option>
                    <option value="other">Other</option>
                </select>               
                <input id="expAmount" placeholder="Amount">
                <input type="datetime-local" id="expDate">
            </div>

            <div id="expenseBreakdown" style="margin-top:10px;"></div>
            <button class="primary" onclick="addExpense()">Add Expense</button>

            <table>
                <tbody id="expenseTable"></tbody>
            </table>
        </div>

        <!-- REMINDERS -->
        <div id="reminderSection" class="screen">
            <h2>Reminders</h2>

            <div class="cards">

                <!-- Distributor -->
                <div class="card blue">
                    <h3>📦 Distributor Due</h3>
                    <input id="distName" placeholder="Distributor Name">
                    <input id="distPhone" placeholder="Phone Number">
                    <input id="distAmount" placeholder="Amount">
                    <button onclick="sendDistributorReminder()">Send Reminder</button>
                </div>

                <!-- Customer -->
                <div class="card green">
                    <h3>👤 Customer Due</h3>
                    <p>Use ledger WhatsApp or send all:</p>
                    <button onclick="sendBulkCustomerReminder()">Send Bulk</button>
                </div>

            </div>
        </div>

    </div>
</div>

<script src="/static/script.js"></script>
</body>
</html>
