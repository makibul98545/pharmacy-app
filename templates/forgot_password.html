{% extends "base.html" %}

{% block content %}

<div class="card p-4" style="max-width: 400px; margin:auto;">
    
    <h4 class="text-center mb-3">🔒 Reset Password</h4>

    <form method="POST">
        <input 
            type="text" 
            name="username" 
            class="form-control mb-3" 
            placeholder="Enter Username" 
            required>

        <input 
            type="password" 
            name="new_password" 
            class="form-control mb-3" 
            placeholder="Enter New Password" 
            required>

        <button class="btn btn-danger w-100">Reset Password</button>

        {% if error %}
        <div class="alert alert-danger mt-3 text-center">{{ error }}</div>
        {% endif %}

        {% if success %}
        <div class="alert alert-success mt-3 text-center">{{ success }}</div>
        {% endif %}

    </form>

</div>

{% endblock %}
