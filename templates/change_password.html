{% extends "base.html" %}

{% block content %}

<div class="card p-4" style="max-width: 400px; margin: auto;">

    <h4 class="mb-4 text-center">🔒 Change Password</h4>

    <form method="POST">
        <input type="password" name="current_password" class="form-control mb-3" placeholder="Current Password" required>

        <input type="password" name="new_password" class="form-control mb-3" placeholder="New Password" required>

        <button type="submit" class="btn btn-primary w-100">Update Password</button>
    </form>

    {% if error %}
        <div class="alert alert-danger mt-3 text-center">{{ error }}</div>
    {% endif %}

    {% if success %}
        <div class="alert alert-success mt-3 text-center">{{ success }}</div>
    {% endif %}

</div>

{% if toast %}
<script>
    showToast("{{ toast.message }}", "{{ toast.category }}");
</script>
{% endif %}

{% endblock %}
