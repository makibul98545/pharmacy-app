{% extends "base.html" %}

{% block content %}

<div class="card p-4">

    <!-- HEADER -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h4 class="mb-0">Invoice</h4>
            <small class="text-muted">MM LifeCare Pharmacy</small>
        </div>
        <div class="text-end">
            <div><strong>Date:</strong> {{ date }}</div>
        </div>
    </div>

    <!-- TABLE -->
    <table class="table table-bordered">
        <thead>
            <tr>
                <th>Medicine</th>
                <th>Batch</th>
                <th>Qty</th>
                <th>MRP (₹)</th>
                <th>Total (₹)</th>
                <th width="80">Action</th>
            </tr>
        </thead>

        <tbody>
        {% for item in bill %}
        <tr>
            <td>{{ item.medicine }}</td>
            <td>{{ item.batch }}</td>

            <!-- ✅ LIVE QTY CONTROL -->
            <td>
                <div style="display:flex; gap:5px; align-items:center;">
                    
                    <button class="btn btn-sm btn-danger minus-btn">−</button>

                    <input 
                        type="number" 
                        value="{{ item.qty }}" 
                        min="1"
                        class="form-control form-control-sm qty-input"
                        style="width:60px; text-align:center;"
                    >

                    <button class="btn btn-sm btn-success plus-btn">+</button>

                    <button class="btn btn-sm btn-primary update-btn">✔</button>

                    <!-- hidden fields -->
                    <input type="hidden" class="index" value="{{ loop.index0 }}">
                </div>
            </td>

            <td>{{ item.mrp }}</td>
            <td>{{ item.total }}</td>

            <!-- ❌ REMOVE ITEM -->
            <td>
                <form method="POST" action="/remove_item">
                    <input type="hidden" name="index" value="{{ loop.index0 }}">
                    <button class="btn btn-danger btn-sm">✕</button>
                </form>
            </td>
        </tr>
        {% endfor %}
        </tbody>
    </table>

    <!-- TOTAL -->
    <div class="text-end mt-3">
        <h4>
            Grand Total: 
            <span class="text-success">₹ {{ total }}</span>
        </h4>
    </div>

    <!-- ACTIONS -->
    <div class="mt-4 d-flex gap-2">

        <form method="POST" action="/finalize" class="w-100">
            <button class="btn btn-success w-100">✔ Finalize Sale</button>
        </form>

        <button class="btn btn-secondary w-100" onclick="window.print()">🖨 Print</button>

    </div>

</div>

<!-- ✅ LIVE UPDATE SCRIPT -->
<script>
document.querySelectorAll("tbody tr").forEach(row => {

    const plusBtn = row.querySelector(".plus-btn");
    const minusBtn = row.querySelector(".minus-btn");
    const updateBtn = row.querySelector(".update-btn");

    if (!plusBtn) return;

    const qtyInput = row.querySelector(".qty-input");
    const index = row.querySelector(".index").value;

    function updateQty(action, manualQty=null) {

        let formData = new FormData();
        formData.append("index", index);
        formData.append("action", action);

        if (manualQty !== null) {
            formData.append("new_qty", manualQty);
        }

        fetch("/update_qty", {
            method: "POST",
            body: formData
        })
        .then(res => res.json())
        .then(data => {
            if (data.status === "success") {
                location.reload();  // safe refresh
            }
        });
    }

    plusBtn.addEventListener("click", () => {
        updateQty("plus");
    });

    minusBtn.addEventListener("click", () => {
        updateQty("minus");
    });

    updateBtn.addEventListener("click", () => {
        updateQty("set", qtyInput.value);
    });

});
</script>

{% endblock %}
